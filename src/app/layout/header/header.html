<header class="dashboard-header">
  <div class="header-main">
    <div class="header-left">
      <button class="menu-toggle" (click)="onMenuClick()">
        <fa-icon [icon]="icons.bars"></fa-icon>
      </button>

      <div class="header-title-block">
        <p class="header-kicker">{{ currentHeader.kicker }}</p>

        <div class="header-title-row">
          <h1 class="header-title">{{ currentHeader.title }}</h1>
          <span class="header-status">{{ currentHeader.badge }}</span>
        </div>
      </div>
    </div>

    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar icon-avatar">
          <fa-icon [icon]="icons.user"></fa-icon>
        </div>
        <div class="user-info">
          <p class="user-name">{{ user.name }}</p>
          <p class="user-role">{{ user.role }}</p>
        </div>
      </div>
    </div>
  </div>
</header>
